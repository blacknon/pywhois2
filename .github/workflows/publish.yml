name: Publish

on:
  release:
    types:
      - published

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions: {}

concurrency:
  group: pypi-publish-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

jobs:
  build-distributions:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Verify release version matches tag
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re
          import sys

          pyproject = pathlib.Path("pyproject.toml").read_text(encoding="utf-8")
          match = re.search(r'^version = "([^"]+)"$', pyproject, re.MULTILINE)
          if not match:
              raise SystemExit("Could not find project version in pyproject.toml")

          version = match.group(1)
          tag = os.environ["RELEASE_TAG"].lstrip("v")
          if version != tag:
              raise SystemExit(
                  f"Release tag version mismatch: pyproject.toml={version!r}, tag={tag!r}"
              )
          PY

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v6
        with:
          name: python-package-distributions
          path: dist/*

  publish-to-pypi:
    needs: build-distributions
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
